<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ STAR CATCHER | Falling Stars Game Demo</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Courier New', monospace;
            padding: 20px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(255, 215, 0, 0.3), 0 0 0 6px rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            cursor: none;
            transition: transform 0.2s ease;
        }

        canvas:hover {
            transform: scale(1.01);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 80px;
            border: 1px solid rgba(255, 220, 100, 0.5);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }

        .stats {
            display: flex;
            gap: 32px;
            font-weight: bold;
        }

        .stat {
            background: #010018;
            padding: 8px 18px;
            border-radius: 40px;
            text-align: center;
            color: #ffecb3;
            text-shadow: 0 0 5px #ffaa33;
            box-shadow: inset 0 1px 2px rgba(255,255,200,0.2), 0 3px 6px rgba(0,0,0,0.3);
        }

        .stat span:first-child {
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 300;
            color: #ffd966;
        }

        .stat .value {
            font-size: 2rem;
            font-weight: 800;
            margin-left: 8px;
            font-family: 'Orbitron', monospace;
            color: #ffdd88;
            text-shadow: 0 0 8px #ffaa33;
        }

        button {
            background: linear-gradient(135deg, #ffcc44, #ffaa22);
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 60px;
            color: #1e1a2f;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #b4621a;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #b4621a;
        }

        .controls {
            display: flex;
            gap: 28px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffe3aa;
        }

        .controls i {
            font-style: normal;
            background: #1f2336;
            padding: 4px 12px;
            border-radius: 30px;
            margin: 0 6px;
            font-family: monospace;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 0px gold; }
            100% { text-shadow: 0 0 12px #ffcc44; }
        }

        .game-over-msg {
            font-size: 1.2rem;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="900" height="650"></canvas>
    <div class="info-panel">
        <div class="stats">
            <div class="stat"><span>⭐ SCORE</span><span class="value" id="scoreValue">0</span></div>
            <div class="stat"><span>❤️ LIVES</span><span class="value" id="livesValue">3</span></div>
            <div class="stat"><span>🏆 BEST</span><span class="value" id="highScoreValue">0</span></div>
        </div>
        <button id="restartButton">🌀 RESTART</button>
    </div>
    <div class="controls">
        <span>🎮 <i>← →</i> ARROWS  or  🖱️ <i>MOUSE</i> move</span>
        <span>✨ CATCH STARS → +10  &nbsp;&nbsp;⚡ MISS → ❤️-1</span>
        <span>🔁 PRESS <i>R</i> to RESTART</span>
    </div>
</div>

<script>
    (function(){
        // ----- CANVAS & CONTEXT -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ----- GAME DIMENSIONS -----
        const CW = 900;
        const CH = 650;
        canvas.width = CW;
        canvas.height = CH;
        
        // ----- PLAYER SETTINGS -----
        const PLAYER_WIDTH = 100;
        const PLAYER_HEIGHT = 28;
        const PLAYER_Y = CH - PLAYER_HEIGHT - 15;   // fixed Y near bottom
        
        // ----- GAME STATE -----
        let gameRunning = true;
        let score = 0;
        let lives = 3;
        let highScore = localStorage.getItem('starCatcherHigh') ? parseInt(localStorage.getItem('starCatcherHigh')) : 0;
        
        // ----- DYNAMIC OBJECTS -----
        let stars = [];          // each star: {x, y, radius, speedY }
        
        // ----- PLAYER POSITION -----
        let playerX = (CW / 2) - (PLAYER_WIDTH / 2);
        
        // ----- CONTROLS (keyboard) -----
        const keys = {
            ArrowLeft: false,
            ArrowRight: false
        };
        
        // ----- MOUSE TRACKING -----
        let mouseInside = false;
        let mouseXinCanvas = null;
        
        // ----- TIMING & DELTA TIME (frame independent) -----
        let lastTimestamp = 0;
        let deltaTime = 0;
        
        // ----- SPAWN TIMER (delta-based) -----
        let spawnAccumulator = 0;
        
        // ----- HELPER FUNCTIONS (difficulty scaling) -----
        function getCurrentSpawnInterval() {
            // base interval 1.1 sec, decreases with score, min 0.32 sec
            let interval = 1.1 - (score / 2000);
            if (interval < 0.32) interval = 0.32;
            return interval;
        }
        
        function getBaseStarSpeed() {
            // speed scales from 190 up to 560 pps based on score
            let speed = 190 + (score / 38);
            if (speed > 560) speed = 560;
            return speed;
        }
        
        // spawn a new falling star
        function spawnStar() {
            const radius = 10 + Math.random() * 11;   // 10 to 21px
            const baseSpd = getBaseStarSpeed();
            // random variation ± 35 pps for organic feel
            const variation = (Math.random() - 0.5) * 70;
            let speedY = baseSpd + variation;
            if (speedY < 150) speedY = 150;
            const xPos = Math.random() * (CW - radius * 2) + radius;
            stars.push({
                x: xPos,
                y: -radius,            // start just above canvas
                radius: radius,
                speedY: speedY
            });
        }
        
        // collision: circle (star) vs axis-aligned rectangle (player)
        function circleRectCollision(cx, cy, rad, rx, ry, rw, rh) {
            let closestX = Math.max(rx, Math.min(cx, rx + rw));
            let closestY = Math.max(ry, Math.min(cy, ry + rh));
            let dx = cx - closestX;
            let dy = cy - closestY;
            return (dx * dx + dy * dy) < rad * rad;
        }
        
        // update game logic (movement, collisions, miss, spawn, gameover)
        function updateGame(deltaSec) {
            if (!gameRunning) return;
            
            // ----- 1. PLAYER MOVEMENT (keyboard + mouse hybrid) -----
            let moveDelta = 0;
            const playerSpeed = 780; // pixels per second
            
            if (keys.ArrowLeft) moveDelta = -playerSpeed * deltaSec;
            if (keys.ArrowRight) moveDelta = playerSpeed * deltaSec;
            
            let newPlayerX = playerX + moveDelta;
            // keyboard boundary
            newPlayerX = Math.min(Math.max(newPlayerX, 0), CW - PLAYER_WIDTH);
            
            // mouse control (if mouse inside canvas, override smoothly)
            if (mouseInside && mouseXinCanvas !== null) {
                let targetMouseX = mouseXinCanvas - (PLAYER_WIDTH / 2);
                targetMouseX = Math.min(Math.max(targetMouseX, 0), CW - PLAYER_WIDTH);
                // immediate snap for fluid mouse tracking - typical for catcher games
                newPlayerX = targetMouseX;
            }
            
            playerX = newPlayerX;
            
            // ----- 2. UPDATE STARS + COLLISIONS + MISS -----
            const playerRect = {
                x: playerX,
                y: PLAYER_Y,
                w: PLAYER_WIDTH,
                h: PLAYER_HEIGHT
            };
            
            // we iterate backwards to safely remove stars
            for (let i = stars.length-1; i >= 0; i--) {
                const s = stars[i];
                // move star
                s.y += s.speedY * deltaSec;
                
                // 1) collision with player
                if (circleRectCollision(s.x, s.y, s.radius, playerRect.x, playerRect.y, playerRect.w, playerRect.h)) {
                    // CATCH !
                    stars.splice(i,1);
                    score += 10;
                    // update highscore dynamic
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('starCatcherHigh', highScore);
                    }
                    continue;
                }
                
                // 2) miss: star passed bottom (plus radius beyond canvas)
                if (s.y + s.radius >= CH) {
                    stars.splice(i,1);
                    lives--;
                    if (lives <= 0) {
                        gameRunning = false;
                        lives = 0;
                        // game over break out of loop early
                        return;
                    }
                    continue;
                }
            }
            
            // ----- 3. SPAWN LOGIC (delta time based) -----
            if (gameRunning) {
                let interval = getCurrentSpawnInterval();
                spawnAccumulator += deltaSec;
                // limit max stars on screen to avoid performance wall (optional)
                const MAX_STARS = 42;
                while (spawnAccumulator >= interval && stars.length < MAX_STARS) {
                    spawnStar();
                    spawnAccumulator -= interval;
                    // re-evaluate interval in case difficulty changed due to score incremented within spawn loop
                    interval = getCurrentSpawnInterval();
                }
                // avoid accumulator explosion (cap)
                if (spawnAccumulator > interval * 2) spawnAccumulator = interval;
            }
        }
        
        // ------------- DRAW EVERYTHING (visual feast) -------------
        function drawStarsBackground() {
            // subtle starfield effect
            for (let i = 0; i < 180; i++) {
                if (i%2 === 0) continue; // random static but draw some twinkles
                ctx.fillStyle = `rgba(255,240,200,${0.2+Math.sin(Date.now()*0.001+i)*0.1})`;
                ctx.beginPath();
                ctx.arc( (i*131)%CW, (i*57)%CH, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawPlayer() {
            const x = playerX;
            const y = PLAYER_Y;
            // futuristic catcher / basket
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ffcc55";
            // glowing base
            ctx.fillStyle = "#3a2c1f";
            ctx.beginPath();
            ctx.roundRect(x, y, PLAYER_WIDTH, PLAYER_HEIGHT, 12);
            ctx.fill();
            // metallic rim
            ctx.fillStyle = "#e0b354";
            ctx.beginPath();
            ctx.roundRect(x+4, y-4, PLAYER_WIDTH-8, 8, 6);
            ctx.fill();
            ctx.fillStyle = "#ffde9c";
            ctx.beginPath();
            ctx.roundRect(x+2, y+2, PLAYER_WIDTH-4, PLAYER_HEIGHT-4, 8);
            ctx.fill();
            // inner glow pattern
            ctx.fillStyle = "#f7c56e";
            ctx.beginPath();
            ctx.roundRect(x+8, y+6, PLAYER_WIDTH-16, PLAYER_HEIGHT-12, 5);
            ctx.fill();
            // handle decoration
            ctx.fillStyle = "#ad7a3a";
            ctx.fillRect(x+PLAYER_WIDTH/2-12, y-10, 24, 12);
            ctx.fillStyle = "#deb887";
            ctx.fillRect(x+PLAYER_WIDTH/2-8, y-12, 16, 8);
            
            // metallic shine
            ctx.fillStyle = "#fff3bf";
            ctx.beginPath();
            ctx.roundRect(x+10, y+4, 20, 5, 3);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawStar(star) {
            const {x, y, radius} = star;
            // radial gradient for glowing star
            const grad = ctx.createRadialGradient(x-3, y-3, 2, x, y, radius);
            grad.addColorStop(0, '#fff7b0');
            grad.addColorStop(0.5, '#ffd966');
            grad.addColorStop(1, '#f0a500');
            ctx.shadowBlur = 14;
            ctx.shadowColor = "orange";
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            // inner spark
            ctx.beginPath();
            ctx.arc(x-2, y-2, radius*0.25, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+2, y+1, radius*0.15, 0, Math.PI*2);
            ctx.fill();
            // star spikes effect
            ctx.shadowBlur = 6;
            for(let ang=0; ang<Math.PI*2; ang+=Math.PI/4){
                let dx = Math.cos(ang)*radius*0.9;
                let dy = Math.sin(ang)*radius*0.9;
                ctx.beginPath();
                ctx.moveTo(x+dx*0.5, y+dy*0.5);
                ctx.lineTo(x+dx*1.2, y+dy*1.2);
                ctx.lineTo(x+dx*0.7, y+dy*0.7);
                ctx.fillStyle = '#ffcc55';
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function drawLives() {
            // draw hearts near top right
            const heartX = CW - 130;
            const heartY = 32;
            for (let i = 0; i < lives; i++) {
                ctx.fillStyle = "#ff4d6d";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "#ff8c9e";
                ctx.beginPath();
                const x = heartX + i * 38;
                const y = heartY;
                ctx.moveTo(x, y+8);
                ctx.bezierCurveTo(x-5, y, x-12, y-5, x, y-12);
                ctx.bezierCurveTo(x+12, y-5, x+5, y, x, y+8);
                ctx.fill();
                // inner shine
                ctx.fillStyle = "#ffb3c1";
                ctx.beginPath();
                ctx.moveTo(x-2, y);
                ctx.bezierCurveTo(x-6, y-3, x-8, y-6, x-2, y-8);
                ctx.bezierCurveTo(x+2, y-6, x+1, y-3, x-2, y);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function drawUI() {
            // score display on top left
            ctx.font = "bold 28px 'Orbitron', monospace";
            ctx.fillStyle = "#fff1c1";
            ctx.shadowBlur = 0;
            ctx.fillText(`⭐ ${score}`, 25, 58);
            // highscore right side
            ctx.font = "bold 18px monospace";
            ctx.fillStyle = "#ffe5a3";
            ctx.fillText(`🏆 HIGH ${highScore}`, CW-140, 45);
            
            // difficulty indicator (speed effect)
            let speedPercent = Math.min(100, Math.floor(((getBaseStarSpeed()-190)/370)*100));
            ctx.font = "12px monospace";
            ctx.fillStyle = "#ffdb7e";
            ctx.fillText(`⚡ FALL SPEED +${speedPercent>0?speedPercent:0}%`, CW-130, 88);
        }
        
        function drawGameOverlay() {
            if (!gameRunning) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, CW, CH);
                ctx.font = "800 42px 'Segoe UI', 'Orbitron'";
                ctx.fillStyle = "#ffcf4a";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText("💀 GAME OVER 💀", CW/2, CH/2 - 40);
                ctx.font = "24px monospace";
                ctx.fillStyle = "#f4c542";
                ctx.fillText(`final score: ${score}`, CW/2, CH/2 + 30);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#ffeda3";
                ctx.fillText("press [R] or click RESTART", CW/2, CH/2 + 95);
                ctx.textAlign = "left";
            }
        }
        
        function drawSparklesAndParticles() {
            // ambient magic dust
            for(let i=0;i<12;i++){
                let fx = (Date.now()*0.002 + i*73) % CW;
                let fy = (Date.now()*0.0015 + i*47) % CH;
                ctx.beginPath();
                ctx.arc(fx, fy, 2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,215,0,${0.3+Math.sin(Date.now()*0.005+i)*0.2})`;
                ctx.fill();
            }
        }
        
        // roundRect utility
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        function drawStarsOnScreen() {
            for (let star of stars) {
                drawStar(star);
            }
        }
        
        function drawBackgroundGradient() {
            const grad = ctx.createLinearGradient(0, 0, 0, CH);
            grad.addColorStop(0, '#070b1c');
            grad.addColorStop(0.7, '#141a32');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CW, CH);
            // draw moon glow
            ctx.beginPath();
            ctx.arc(120, 90, 45, 0, Math.PI*2);
            ctx.fillStyle = "#fdf4cf";
            ctx.shadowBlur = 35;
            ctx.shadowColor = "#ffde9e";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(135, 80, 12, 0, Math.PI*2);
            ctx.fillStyle = "#f5e6b0";
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // ----- MAIN RENDER PIPELINE -----
        function render() {
            drawBackgroundGradient();
            drawStarsBackground();
            drawStarsOnScreen();      // draw falling stars
            drawPlayer();
            drawLives();
            drawUI();
            drawSparklesAndParticles();
            drawGameOverlay();
        }
        
        // ----- GAME LOOP (delta time)-----
        let animationId = null;
        function gameLoop(nowMs) {
            if (!lastTimestamp) {
                lastTimestamp = nowMs;
                requestAnimationFrame(gameLoop);
                return;
            }
            // compute delta time (seconds) capped at 0.03 sec (33ms max jump)
            let rawDelta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
            if (rawDelta <= 0) {
                lastTimestamp = nowMs;
                requestAnimationFrame(gameLoop);
                return;
            }
            deltaTime = rawDelta;
            lastTimestamp = nowMs;
            
            // update game simulation only if running
            if (gameRunning) {
                updateGame(deltaTime);
            }
            
            // always render fresh frame
            render();
            
            // update UI numbers
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('livesValue').innerText = lives;
            document.getElementById('highScoreValue').innerText = highScore;
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ---------- RESTART FUNCTION ----------
        function restartGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            stars = [];
            playerX = (CW / 2) - (PLAYER_WIDTH / 2);
            spawnAccumulator = 0;
            // reset timers, no extra leftover
            if (highScore < score) {
                highScore = score;
                localStorage.setItem('starCatcherHigh', highScore);
            } else {
                // get fresh highscore from storage
                let stored = localStorage.getItem('starCatcherHigh');
                if(stored) highScore = parseInt(stored);
                else highScore = 0;
            }
            // avoid highscore reset weirdness
            document.getElementById('highScoreValue').innerText = highScore;
            // fresh spawns start clean
        }
        
        // ----- EVENT LISTENERS (keyboard, mouse, restart)-----
        function handleKeyDown(e) {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
                keys[e.key] = true;
            }
            if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                restartGame();
            }
        }
        
        function handleKeyUp(e) {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
                keys[e.key] = false;
            }
        }
        
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let mouseCanvasX = (e.clientX - rect.left) * scaleX;
            mouseCanvasX = Math.min(Math.max(mouseCanvasX, 0), CW);
            mouseXinCanvas = mouseCanvasX;
            mouseInside = true;
            // optional realtime position set also handled in update, but we keep for snappiness
            if (gameRunning) {
                let newX = mouseXinCanvas - (PLAYER_WIDTH / 2);
                newX = Math.min(Math.max(newX, 0), CW - PLAYER_WIDTH);
                playerX = newX;
            }
        }
        
        function handleMouseLeave() {
            mouseInside = false;
            mouseXinCanvas = null;
        }
        
        function handleMouseEnter(e) {
            mouseInside = true;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let mouseCanvasX = (e.clientX - rect.left) * scaleX;
            mouseCanvasX = Math.min(Math.max(mouseCanvasX, 0), CW);
            mouseXinCanvas = mouseCanvasX;
            if (gameRunning) {
                let newX = mouseXinCanvas - (PLAYER_WIDTH / 2);
                newX = Math.min(Math.max(newX, 0), CW - PLAYER_WIDTH);
                playerX = newX;
            }
        }
        
        window.addEventListener('load', () => {
            restartGame();  // ensure fresh start
            // set highscore display
            let storedHigh = localStorage.getItem('starCatcherHigh');
            if(storedHigh) highScore = parseInt(storedHigh);
            else highScore = 0;
            document.getElementById('highScoreValue').innerText = highScore;
            
            // restart button
            const restartBtn = document.getElementById('restartButton');
            restartBtn.addEventListener('click', () => {
                restartGame();
            });
            
            // keyboard
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            // mouse tracking
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseleave', handleMouseLeave);
            canvas.addEventListener('mouseenter', handleMouseEnter);
            
            // start the loop
            lastTimestamp = 0;
            animationId = requestAnimationFrame(gameLoop);
        });
        
        // clean up on hypothetical page unload (not required but nice)
        window.addEventListener('beforeunload', ()=>{
            if(animationId) cancelAnimationFrame(animationId);
        });
    })();
</script>
</body>
</html>
